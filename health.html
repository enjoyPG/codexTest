<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Todo Studio Health Check</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f3ee;
        color: #22201d;
      }

      main {
        width: min(92vw, 560px);
        border: 1px solid #e1dbd1;
        border-radius: 8px;
        background: #fffdf9;
        padding: 24px;
      }

      code {
        display: block;
        overflow-wrap: anywhere;
        border-radius: 8px;
        background: #f0ece4;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GitHub Pages is serving this repository.</h1>
      <p>If this page opens, Pages is enabled and the network can reach the site.</p>
      <code id="url"></code>
    </main>
    <script>
      console.log("[TodoStudio][HEALTH_OK]", window.location.href);
      document.querySelector("#url").textContent = window.location.href;
    </script>
  </body>
</html>
