<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Todo Studio</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="todo-panel" aria-label="Todo app">
        <header class="app-header">
          <div>
            <p class="eyebrow">Today</p>
            <h1>Todo Studio</h1>
          </div>
          <div class="progress-ring" aria-label="완료율">
            <span id="progressValue">0%</span>
          </div>
        </header>

        <form class="todo-form" id="todoForm">
          <label class="sr-only" for="todoInput">할 일</label>
          <input id="todoInput" type="text" placeholder="할 일을 입력하세요" autocomplete="off" maxlength="80">
          <button type="submit">추가</button>
        </form>

        <div class="toolbar" aria-label="Todo filters">
          <button class="filter-button is-active" type="button" data-filter="all">전체</button>
          <button class="filter-button" type="button" data-filter="active">진행</button>
          <button class="filter-button" type="button" data-filter="done">완료</button>
        </div>

        <ul class="todo-list" id="todoList" aria-live="polite"></ul>

        <footer class="app-footer">
          <span id="countLabel">0개 남음</span>
          <button class="text-button" id="clearDoneButton" type="button">완료 삭제</button>
        </footer>
      </section>
    </main>

    <template id="todoTemplate">
      <li class="todo-item">
        <label class="check-wrap">
          <input class="todo-check" type="checkbox">
          <span class="custom-check" aria-hidden="true"></span>
        </label>
        <span class="todo-title"></span>
        <button class="delete-button" type="button" aria-label="삭제">×</button>
      </li>
    </template>

    <script src="script.js"></script>
  </body>
</html>
