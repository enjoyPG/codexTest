<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Todo Studio</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="todo-panel" aria-label="Todo app">
        <header class="app-header">
          <div>
            <p class="eyebrow">Today</p>
            <h1>Todo Studio</h1>
          </div>
          <div class="progress-ring" aria-label="Completion rate">
            <span id="progressValue">0%</span>
          </div>
        </header>

        <form class="todo-form" id="todoForm">
          <label class="sr-only" for="todoInput">Todo title</label>
          <input id="todoInput" type="text" placeholder="Add a task" autocomplete="off" maxlength="80">
          <button type="submit">Add</button>
        </form>

        <div class="toolbar" aria-label="Todo filters">
          <button class="filter-button is-active" type="button" data-filter="all">All</button>
          <button class="filter-button" type="button" data-filter="active">Active</button>
          <button class="filter-button" type="button" data-filter="done">Done</button>
        </div>

        <ul class="todo-list" id="todoList" aria-live="polite"></ul>

        <section class="diagnostics" aria-label="Diagnostics">
          <strong id="statusLabel">APP_BOOT</strong>
          <pre id="diagnosticsLog">Starting app...</pre>
        </section>

        <footer class="app-footer">
          <span id="countLabel">0 left</span>
          <button class="text-button" id="clearDoneButton" type="button">Clear done</button>
        </footer>
      </section>
    </main>

    <template id="todoTemplate">
      <li class="todo-item">
        <label class="check-wrap">
          <input class="todo-check" type="checkbox">
          <span class="custom-check" aria-hidden="true"></span>
        </label>
        <span class="todo-title"></span>
        <button class="delete-button" type="button" aria-label="Delete">x</button>
      </li>
    </template>

    <script>
      window.addEventListener("error", (event) => {
        console.error("[TodoStudio][WINDOW_ERROR]", event.message, event.filename, event.lineno, event.colno);
      });
      window.addEventListener("unhandledrejection", (event) => {
        console.error("[TodoStudio][UNHANDLED_REJECTION]", event.reason);
      });
    </script>
    <script type="module" src="script.js"></script>
  </body>
</html>
